<

<form action="#" method="post">
    <fieldset>
        <legend>Get in Touch</legend>

        <label for="fullname">Full Name*</label>
        <input type="text" id="fullname" name="fullname" placeholder="Enter your full name" required><br>

        <label for="email">Email*</label>
        <input type="email" id="email" name="email" placeholder="Enter your email" required><br>

        <label for="phone">Phone</label>
        <input type="tel" id="phone" name="phone" placeholder="Enter your phone number"><br>

        <label for="subject">Subject*</label>
        <select id="subject" name="subject" required>
            <option value="">Select a subject</option>
            <option value="general">General Inquiry</option>
            <option value="support">Support</option>
            <option value="feedback">Feedback</option>
        </select><br>

        <label for="message">Message*</label>
        <textarea id="message" name="message" placeholder="Type your message (min 50 characters)" required minlength="50"></textarea> <br>

        <label>
            <input type="checkbox" name="newsletter" value="yes">
            Subscribe to our newsletter
        </label><br>

        <button type="submit">Send Message</button>

    </fieldset>
</form>
